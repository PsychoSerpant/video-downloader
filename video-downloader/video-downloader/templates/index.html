<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VDROP — Video Downloader</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0a;
      --surface: #111111;
      --border: #222222;
      --accent: #e8ff47;
      --accent-dim: #c8df27;
      --text: #f0f0f0;
      --muted: #555;
      --danger: #ff4757;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(232,255,71,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(232,255,71,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 640px;
    }

    header {
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }

    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 12vw, 7rem);
      line-height: 0.9;
      color: var(--accent);
      letter-spacing: 0.02em;
      text-shadow: 0 0 60px rgba(232,255,71,0.2);
    }

    .tagline {
      font-size: 0.7rem;
      color: var(--muted);
      letter-spacing: 0.25em;
      text-transform: uppercase;
      margin-top: 0.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 2rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .label {
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
      display: block;
    }

    .input-row {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      transition: border-color 0.2s;
    }

    .input-row:focus-within {
      border-color: var(--accent);
    }

    input[type="url"] {
      flex: 1;
      background: transparent;
      border: none;
      outline: none;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      padding: 0.85rem 1rem;
    }

    input[type="url"]::placeholder {
      color: var(--muted);
    }

    button[type="submit"] {
      background: var(--accent);
      color: #0a0a0a;
      border: none;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.1rem;
      letter-spacing: 0.08em;
      padding: 0 1.6rem;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      flex-shrink: 0;
    }

    button[type="submit"]:hover { background: var(--accent-dim); }
    button[type="submit"]:active { transform: scale(0.98); }
    button[type="submit"]:disabled {
      background: #333;
      color: #666;
      cursor: not-allowed;
    }

    .status {
      margin-top: 1.5rem;
      min-height: 3rem;
      font-size: 0.78rem;
    }

    .status-line {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      color: var(--muted);
    }

    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }

    .result-box {
      background: #0f1a00;
      border: 1px solid var(--accent);
      padding: 1.2rem;
      margin-top: 1.5rem;
      animation: fadeUp 0.3s ease both;
    }

    .result-box .file-name {
      font-size: 0.78rem;
      color: var(--accent);
      word-break: break-all;
      margin-bottom: 1rem;
    }

    .dl-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      background: var(--accent);
      color: #0a0a0a;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.1em;
      padding: 0.6rem 1.4rem;
      text-decoration: none;
      transition: background 0.15s;
    }

    .dl-btn:hover { background: var(--accent-dim); }

    .error-box {
      background: #1a0005;
      border: 1px solid var(--danger);
      padding: 1rem;
      margin-top: 1.5rem;
      font-size: 0.75rem;
      color: var(--danger);
      animation: fadeUp 0.3s ease both;
      word-break: break-word;
    }

    .supported {
      margin-top: 2rem;
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      animation: fadeUp 0.6s 0.2s ease both;
    }

    .supported span {
      color: #333;
      margin: 0 0.4em;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <div class="logo">VDROP</div>
      <div class="tagline">Universal Video Downloader &mdash; Powered by yt-dlp</div>
    </header>

    <div class="card">
      <label class="label" for="url-input">Paste video URL</label>
      <form id="dl-form">
        <div class="input-row">
          <input
            id="url-input"
            type="url"
            name="url"
            placeholder="https://youtube.com/watch?v=..."
            required
            autocomplete="off"
            spellcheck="false"
          />
          <button type="submit" id="submit-btn">FETCH</button>
        </div>
      </form>

      <div class="status" id="status"></div>
    </div>

    <div class="supported">
      YouTube <span>·</span> Twitter/X <span>·</span> Instagram <span>·</span>
      Vimeo <span>·</span> TikTok <span>·</span> 1000+ more
    </div>
  </div>

  <script>
    const form = document.getElementById('dl-form');
    const status = document.getElementById('status');
    const btn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const url = document.getElementById('url-input').value.trim();
      if (!url) return;

      btn.disabled = true;
      btn.textContent = '...';
      status.innerHTML = `
        <div class="status-line">
          <div class="spinner"></div>
          <span>Fetching video — this may take a moment...</span>
        </div>
      `;

      try {
        const body = new FormData();
        body.append('url', url);

        const res = await fetch('/download', { method: 'POST', body });
        const data = await res.json();

        if (data.success) {
          status.innerHTML = '';
          status.insertAdjacentHTML('afterbegin', `
            <div class="result-box">
              <div class="file-name">&#x2713; ${escHtml(data.display_name)}</div>
              <a class="dl-btn" href="${escHtml(data.download_url)}" download>
                &#x2193; DOWNLOAD FILE
              </a>
            </div>
          `);
        } else {
          status.innerHTML = `<div class="error-box">&#x26A0; ${escHtml(data.error)}</div>`;
        }
      } catch (err) {
        status.innerHTML = `<div class="error-box">&#x26A0; Network error. Is the server running?</div>`;
      } finally {
        btn.disabled = false;
        btn.textContent = 'FETCH';
      }
    });

    function escHtml(str) {
      return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
