services:
  - type: web
    name: video-downloader
    env: python
    region: oregon
    plan: free
    buildCommand: |
      apt-get install -y ffmpeg || true
      pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: downloads
      mountPath: /opt/render/project/src/downloads
      sizeGB: 1
